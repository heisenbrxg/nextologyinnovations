<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting to Booking... | Nextology Innovation</title>

    <!-- IMPORTANT: REPLACE "https://cal.com/" BELOW WITH YOUR ACTUAL BOOKING LINK -->
    <meta http-equiv="refresh" content="1; url=file:///E:/nextology/nextology-production/client.html"
        id="meta-redirect" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 94, 58, 0.15);
            border-radius: 50%;
            border-top-color: #FF5E3A;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 35px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .button {
            display: inline-block;
            background: #FF5E3A;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .button:hover {
            background: #e04825;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Opening Booking Portal...</h1>
        <p>You are being redirected to our secure scheduling page. If you are not redirected automatically within a few
            seconds, please click the button below.</p>

        <!-- IMPORTANT: REPLACE "https://cal.com/" BELOW WITH YOUR ACTUAL BOOKING LINK -->
        <a href="https://cal.com/" class="button" id="manual-link">Continue to Booking</a>
    </div>

    <script>
        // Fallback redirect via JavaScript
        setTimeout(function () {
            var targetLink = document.getElementById('manual-link').href;
            if (window.location.href !== targetLink) {
                window.location.href = targetLink;
            }
        }, 1500);
    </script>
</body>

</html>
